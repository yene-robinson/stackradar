<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="16" height="16" rx="3" fill="#0F0F0F"/>
  
  <!-- Radar arc -->
  <path d="M 8 3 A 5 5 0 0 1 13 8" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Stacked bars -->
  <rect x="4" y="6" width="8" height="2" rx="0.5" fill="url(#g)"/>
  <rect x="5" y="9" width="6" height="2" rx="0.5" fill="url(#g)" opacity="0.75"/>
  <rect x="6" y="12" width="4" height="2" rx="0.5" fill="url(#g)" opacity="0.5"/>
  
