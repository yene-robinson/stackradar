<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F7931A;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#0F0F0F"/>
  
  <!-- Outer ring -->
  <circle cx="90" cy="90" r="72" fill="none" stroke="url(#radarGrad)" stroke-width="3" opacity="0.3"/>
  
  <!-- Radar arcs -->
  <path d="M 90 30 A 60 60 0 0 1 150 90" fill="none" stroke="url(#radarGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 90 42 A 48 48 0 0 1 138 90" fill="none" stroke="url(#radarGrad)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M 90 54 A 36 36 0 0 1 126 90" fill="none" stroke="url(#radarGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Stacked elements -->
  <rect x="58" y="72" width="64" height="12" rx="3" fill="url(#radarGrad)"/>
  <rect x="66" y="88" width="48" height="12" rx="3" fill="url(#radarGrad)" opacity="0.8"/>
  <rect x="74" y="104" width="32" height="12" rx="3" fill="url(#radarGrad)" opacity="0.6"/>
  
  <!-- Radar sweep -->
  <line x1="90" y1="90" x2="140" y2="50" stroke="url(#glowGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center -->
  <circle cx="90" cy="90" r="5" fill="url(#radarGrad)"/>
  <circle cx="90" cy="90" r="2.5" fill="#FFFFFF"/>
</svg>
