<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F7931A;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F0F0F"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#radarGrad)" stroke-width="8" opacity="0.3"/>
  
  <!-- Radar arcs - representing scanning/tracking -->
  <path d="M 256 76 A 180 180 0 0 1 436 256" fill="none" stroke="url(#radarGrad)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M 256 106 A 150 150 0 0 1 406 256" fill="none" stroke="url(#radarGrad)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M 256 136 A 120 120 0 0 1 376 256" fill="none" stroke="url(#radarGrad)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Center stacked elements - representing portfolio layers -->
  <rect x="176" y="200" width="160" height="32" rx="6" fill="url(#radarGrad)"/>
  <rect x="196" y="244" width="120" height="32" rx="6" fill="url(#radarGrad)" opacity="0.8"/>
  <rect x="216" y="288" width="80" height="32" rx="6" fill="url(#radarGrad)" opacity="0.6"/>
  
  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="400" y2="140" stroke="url(#glowGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="url(#radarGrad)"/>
  <circle cx="256" cy="256" r="6" fill="#FFFFFF"/>
</svg>
